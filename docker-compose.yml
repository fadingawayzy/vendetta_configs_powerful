services:
  bot:
    build: .
    container_name: vless_bot_bot
    environment:
      - DB_HOST=db
      - MALLOC_TRIM_THRESHOLD_=65534
    restart: always
    env_file:
      - .env.docker
    deploy:
      resources:
        limits:
          memory: 180M
    depends_on:
      - db
    ports:
      - "8080:8080"
    volumes:
      - .:/app

  db:
    image: postgres:13
    container_name: vless_bot_playground
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vless_bot_playground
    ports:
        - "5432:5432"
    command: >
      postgres -c shared_buffers=8MB -c max_connections=5 -c work_mem=1MB -c autovacuum=off -c max_worker_processes=2
    deploy:
      resources:
        limits:
          memory: 80M
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:


