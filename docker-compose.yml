services:
  bot:
    build: .
    container_name: vless_bot_bot
    environment:
      - DB_HOST=db
      - MALLOC_TRIM_THRESHOLD_=65534
    restart: always
    env_file:
      - .env.docker
    depends_on:
      - db
    ports:
      - "8080:8080"
    volumes:
      - .:/app

  db:
    image: postgres:13
    container_name: vless_bot_playground
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vless_bot_playground
    command: >
      postgres  -c shared_buffers=16MB  -c max_connections=10  -c work_mem=1MB  -c maintenance_work_mem=4MB  -c autovacuum=off
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:


